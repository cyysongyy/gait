<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="步態平衡">
<title>步態平衡訓練器</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
<style>
:root{
  --purple:#667eea;--purple2:#764ba2;--purplel:#eef0fd;--purpled:#3d4db5;
  --green:#6bcf7f;--red:#ff6b6b;--amber:#ffd93d;
  --bg:#f7f8fc;--card:#fff;--border:#e8eaf0;
  --tx:#1a1a2e;--tx2:#5a5a7a;--tx3:#9898b8;
  --ra:16px;--ra2:12px;
  --shadow:0 4px 20px rgba(102,126,234,.10);
  --shadow-lg:0 12px 40px rgba(102,126,234,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--tx);
  min-height:100vh;
  padding:max(env(safe-area-inset-top),12px) 12px calc(env(safe-area-inset-bottom)+20px);
  -webkit-tap-highlight-color:transparent;
}
.app{max-width:480px;margin:0 auto;display:flex;flex-direction:column;gap:.75rem}

/* Header */
.hdr{
  background:linear-gradient(135deg,var(--purple),var(--purple2));
  border-radius:var(--ra);
  padding:18px 16px;
  color:#fff;
  display:flex;align-items:center;gap:12px;
  box-shadow:var(--shadow-lg);
}
.hdr-icon{width:44px;height:44px;background:rgba(255,255,255,.2);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.hdr-text h1{font-size:18px;font-weight:700;letter-spacing:-.3px}
.hdr-text p{font-size:11.5px;opacity:.8;margin-top:2px}

/* Permission banner */
.perm-banner{
  background:#fffbeb;border:1.5px solid #fbbf24;border-radius:var(--ra2);
  padding:14px 16px;display:flex;align-items:flex-start;gap:10px;
}
.perm-banner i{color:#d97706;font-size:18px;flex-shrink:0;margin-top:1px}
.perm-banner p{font-size:13px;color:#92400e;flex:1;line-height:1.5}
.btn-perm{
  margin-top:8px;padding:8px 16px;background:#f59e0b;color:#fff;
  border:none;border-radius:8px;font-size:13px;font-weight:600;
  cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;
}
.btn-perm:active{opacity:.85}

/* Balance display */
.balance-card{
  background:var(--card);border-radius:var(--ra);border:1px solid var(--border);
  padding:20px;box-shadow:var(--shadow);
}
.balance-title{font-size:13px;font-weight:600;color:var(--tx2);
  letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px;
  display:flex;align-items:center;gap:6px}
.balance-title i{font-size:15px;color:var(--purple)}

/* Ring meter */
.ring-wrap{
  display:flex;justify-content:center;align-items:center;
  margin-bottom:16px;position:relative;
}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-trk{fill:none;stroke:#eee;stroke-width:8}
.ring-fill{fill:none;stroke:var(--purple);stroke-width:8;stroke-linecap:round;
  transition:stroke-dashoffset .15s ease-out, stroke .15s}
.ring-label{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.ring-score{font-family:'DM Mono',monospace;font-size:36px;font-weight:500;line-height:1;color:var(--tx)}
.ring-unit{font-size:12px;color:var(--tx3);margin-top:3px}
.ring-grade{font-size:13px;font-weight:700;margin-top:2px}

/* Bar meter */
.bar-wrap{margin-bottom:16px}
.bar-label{display:flex;justify-content:space-between;font-size:11.5px;color:var(--tx3);margin-bottom:6px}
.bar-track{
  width:100%;height:14px;background:#eee;border-radius:7px;
  position:relative;overflow:visible;
}
.bar-fill{
  height:100%;border-radius:7px;
  background:linear-gradient(90deg,var(--red) 0%,var(--amber) 50%,var(--green) 100%);
  transition:width .12s ease-out;
  position:relative;
}
.bar-center{
  position:absolute;left:50%;top:-3px;
  width:2px;height:20px;background:var(--tx2);
  transform:translateX(-50%);border-radius:1px;
  opacity:.4;
}
.bar-needle{
  position:absolute;top:-4px;
  width:6px;height:22px;background:var(--tx);
  border-radius:3px;transform:translateX(-50%);
  transition:left .12s ease-out;
  box-shadow:0 2px 6px rgba(0,0,0,.25);
}

/* Value row */
.val-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.val-box{
  background:var(--bg);border-radius:var(--ra2);border:1px solid var(--border);
  padding:10px 8px;text-align:center;
}
.val-lbl{font-size:10.5px;color:var(--tx3);margin-bottom:4px;font-weight:500}
.val-num{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--tx);line-height:1}
.val-unit{font-size:10px;color:var(--tx3);margin-top:2px}

/* Status */
.status{
  border-radius:var(--ra2);padding:12px 14px;
  font-size:13px;display:flex;align-items:flex-start;gap:8px;line-height:1.5;
  border:1px solid var(--border);
}
.status.normal{background:#eef0fd;border-color:#c7ccf7;color:#3d4db5}
.status.warning{background:#fffbeb;border-color:#fbbf24;color:#92400e}
.status.alert{background:#fff1f1;border-color:#fca5a5;color:#991b1b}
.status.good{background:#ecfdf5;border-color:#6ee7b7;color:#065f46}
.status i{flex-shrink:0;font-size:15px;margin-top:1px}

/* Controls */
.btns{display:flex;gap:8px}
.btn{
  flex:1;padding:14px;border:none;border-radius:var(--ra2);
  font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:6px;
  min-height:50px;transition:all .2s;-webkit-tap-highlight-color:transparent;
}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.45;cursor:default;transform:none}
.btn-start{background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff}
.btn-stop{background:var(--red);color:#fff;flex:.7}
.btn-reset{background:var(--bg);border:1.5px solid var(--border);color:var(--tx2);flex:.5}
.btn-reset:active{background:var(--border)}

/* Exercises */
.exercises-card{
  background:var(--card);border-radius:var(--ra);border:1px solid var(--border);
  padding:18px;box-shadow:var(--shadow);
}
.section-title{font-size:13px;font-weight:600;color:var(--tx2);
  letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px;
  display:flex;align-items:center;gap:6px}
.ex-grid{display:flex;flex-direction:column;gap:8px}
.ex-item{
  border:1.5px solid var(--border);border-radius:var(--ra2);padding:12px 14px;
  cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;gap:12px;
}
.ex-item:active{transform:scale(.98)}
.ex-item.active{border-color:var(--purple);background:var(--purplel)}
.ex-item.done{border-color:var(--green);background:#ecfdf5}
.ex-icon{
  width:38px;height:38px;border-radius:50%;background:var(--purplel);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;color:var(--purple);flex-shrink:0;
}
.ex-item.done .ex-icon{background:#dcfce7;color:#16a34a}
.ex-text{flex:1}
.ex-name{font-size:13.5px;font-weight:600;color:var(--tx)}
.ex-desc{font-size:12px;color:var(--tx3);margin-top:2px}
.ex-dur{font-size:11.5px;color:var(--purple);font-weight:600;flex-shrink:0}
.ex-item.done .ex-dur{color:#16a34a}
.ex-timer{
  display:none;margin-top:8px;padding:10px 12px;
  background:var(--purplel);border-radius:var(--ra2);
  font-size:13px;color:var(--purpled);
}
.ex-timer.show{display:block}
.ex-timer-bar{
  height:5px;background:rgba(102,126,234,.2);border-radius:3px;
  margin-top:8px;overflow:hidden;
}
.ex-timer-fill{height:100%;background:var(--purple);border-radius:3px;
  transition:width 1s linear;width:0%}

/* History */
.history-card{
  background:var(--card);border-radius:var(--ra);border:1px solid var(--border);
  padding:18px;box-shadow:var(--shadow);
}
.history-list{display:flex;flex-direction:column;gap:6px}
.history-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;background:var(--bg);border-radius:var(--ra2);
  border:1px solid var(--border);
}
.history-date{font-size:12px;color:var(--tx3);flex:1}
.history-score-badge{
  padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;
}
.score-ex{background:#dcfce7;color:#16a34a}
.score-gd{background:#dbeafe;color:#1d4ed8}
.score-ok{background:#fef9c3;color:#a16207}
.score-nd{background:#fee2e2;color:#991b1b}
.empty-state{text-align:center;padding:20px;font-size:13px;color:var(--tx3)}

/* Timer overlay */
.timer-overlay{
  position:fixed;inset:0;background:rgba(26,26,46,.85);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:100;display:none;
  padding:24px;
}
.timer-overlay.show{display:flex}
.timer-box{
  background:#fff;border-radius:24px;padding:32px 28px;
  width:100%;max-width:340px;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.3);
}
.timer-ex-name{font-size:15px;font-weight:700;color:var(--tx);margin-bottom:6px}
.timer-ex-desc{font-size:13px;color:var(--tx3);margin-bottom:24px;line-height:1.5}
.timer-ring-wrap{display:flex;justify-content:center;margin-bottom:20px}
.timer-ring-wrap svg{transform:rotate(-90deg)}
.timer-trk{fill:none;stroke:#eee;stroke-width:10}
.timer-fill{fill:none;stroke:var(--purple);stroke-width:10;stroke-linecap:round;
  transition:stroke-dashoffset 1s linear}
.timer-num{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.timer-count{font-family:'DM Mono',monospace;font-size:48px;font-weight:500;color:var(--tx);line-height:1}
.timer-unit{font-size:12px;color:var(--tx3);margin-top:4px}
.timer-phase{font-size:16px;font-weight:700;margin-bottom:12px}
.timer-cue{font-size:13px;color:var(--tx3);min-height:20px}
.timer-cancel{
  margin-top:16px;padding:12px 28px;background:var(--bg);
  border:1.5px solid var(--border);border-radius:var(--ra2);
  font-size:14px;font-weight:600;color:var(--tx2);cursor:pointer;
  font-family:inherit;-webkit-tap-highlight-color:transparent;
}
.timer-cancel:active{background:var(--border)}

/* Floating back */
.fab-back{
  position:fixed;bottom:max(env(safe-area-inset-bottom),16px);right:16px;
  width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,var(--purple),var(--purple2));
  color:#fff;border:none;cursor:pointer;font-size:22px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(102,126,234,.4);
  -webkit-tap-highlight-color:transparent;
  display:none;
}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-icon"><i class="ti ti-walk"></i></div>
    <div class="hdr-text">
      <h1>步態平衡訓練器</h1>
      <p>Gait Balance Trainer · 使用手機陀螺儀</p>
    </div>
  </div>

  <!-- Permission banner (iOS only) -->
  <div class="perm-banner" id="permBanner" style="display:none">
    <i class="ti ti-alert-circle"></i>
    <div>
      <p>需要動作感測器權限才能測量步態平衡</p>
      <button class="btn-perm" onclick="requestPerm()">授予權限</button>
    </div>
  </div>

  <!-- Balance display -->
  <div class="balance-card">
    <div class="balance-title"><i class="ti ti-activity"></i>即時平衡</div>

    <!-- Score ring -->
    <div class="ring-wrap">
      <svg width="140" height="140" viewBox="0 0 140 140">
        <circle class="ring-trk" cx="70" cy="70" r="58"/>
        <circle class="ring-fill" id="ringFill" cx="70" cy="70" r="58"
          stroke-dasharray="364.4" stroke-dashoffset="364.4"/>
      </svg>
      <div class="ring-label">
        <div class="ring-score" id="ringScore">--</div>
        <div class="ring-unit">平衡分</div>
        <div class="ring-grade" id="ringGrade" style="color:var(--tx3)">--</div>
      </div>
    </div>

    <!-- Bar -->
    <div class="bar-wrap">
      <div class="bar-label">
        <span><i class="ti ti-arrow-left" style="font-size:11px"></i> 左傾</span>
        <span>中立</span>
        <span>右傾 <i class="ti ti-arrow-right" style="font-size:11px"></i></span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="barFill" style="width:50%"></div>
        <div class="bar-center"></div>
        <div class="bar-needle" id="barNeedle" style="left:50%"></div>
      </div>
    </div>

    <!-- Values -->
    <div class="val-row">
      <div class="val-box">
        <div class="val-lbl">左傾角</div>
        <div class="val-num" id="valLeft">--</div>
        <div class="val-unit">°</div>
      </div>
      <div class="val-box">
        <div class="val-lbl">重心偏移</div>
        <div class="val-num" id="valCenter">--</div>
        <div class="val-unit">°</div>
      </div>
      <div class="val-box">
        <div class="val-lbl">晃動幅度</div>
        <div class="val-num" id="valSway">--</div>
        <div class="val-unit">°</div>
      </div>
    </div>
  </div>

  <!-- Status -->
  <div class="status normal" id="statusBox">
    <i class="ti ti-info-circle"></i>
    <span id="statusText">準備就緒。按下「開始測量」，手持手機直立行走或站立。</span>
  </div>

  <!-- Controls -->
  <div class="btns">
    <button class="btn btn-start" id="btnStart" onclick="startMeasure()">
      <i class="ti ti-player-play"></i>開始測量
    </button>
    <button class="btn btn-stop" id="btnStop" onclick="stopMeasure()" disabled>
      <i class="ti ti-player-stop"></i>停止
    </button>
    <button class="btn btn-reset" onclick="resetAll()">
      <i class="ti ti-refresh"></i>
    </button>
  </div>

  <!-- Balance exercises -->
  <div class="exercises-card">
    <div class="section-title"><i class="ti ti-dumbbell" style="color:var(--purple)"></i>平衡訓練動作</div>
    <div class="ex-grid" id="exGrid"></div>
  </div>

  <!-- History -->
  <div class="history-card">
    <div class="section-title"><i class="ti ti-chart-bar" style="color:var(--purple)"></i>測量記錄</div>
    <div class="history-list" id="historyList">
      <div class="empty-state">尚無記錄</div>
    </div>
  </div>

  <!-- Link back to rehab system -->
  <a href="https://cyysongyy.github.io/5-steps-rehab-for-footdrop/" 
     style="display:flex;align-items:center;gap:12px;padding:14px 16px;
     background:#fff;border-radius:var(--ra);border:1.5px solid var(--border);
     text-decoration:none;color:var(--tx);box-shadow:var(--shadow)">
    <i class="ti ti-arrow-left" style="font-size:18px;color:var(--purple)"></i>
    <div>
      <div style="font-size:13px;font-weight:600">返回復健系統</div>
      <div style="font-size:11.5px;color:var(--tx3)">5-steps-rehab-for-footdrop</div>
    </div>
    <i class="ti ti-external-link" style="margin-left:auto;color:var(--tx3);font-size:15px"></i>
  </a>

  <p style="text-align:center;font-size:11px;color:var(--tx3);line-height:1.8;padding:0 8px 8px">
    本工具僅供個人輔助訓練參考，不構成醫療診斷建議。<br>
    若訓練中出現疼痛、頭暈或不適，請立即停止並就醫。<br>
    版本：2026.07
  </p>

</div>

<!-- Exercise Timer Overlay -->
<div class="timer-overlay" id="timerOverlay">
  <div class="timer-box">
    <div class="timer-ex-name" id="timerName">—</div>
    <div class="timer-ex-desc" id="timerDesc">—</div>
    <div style="position:relative;width:160px;height:160px;margin:0 auto">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <circle class="timer-trk" cx="80" cy="80" r="66"/>
        <circle class="timer-fill" id="timerRing" cx="80" cy="80" r="66"
          stroke-dasharray="414.7" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-num">
        <div class="timer-count" id="timerCount">--</div>
        <div class="timer-unit">秒</div>
      </div>
    </div>
    <div class="timer-phase" id="timerPhase" style="color:var(--purple)">—</div>
    <div class="timer-cue" id="timerCue"></div>
    <button class="timer-cancel" onclick="cancelExercise()">取消</button>
  </div>
</div>

<script>
// ── Constants ──
const C_RING = 2 * Math.PI * 58;  // balance ring
const C_TIMER = 2 * Math.PI * 66; // exercise timer ring

// ── State ──
let isMonitoring = false;
let gammaData = [];
let betaData = [];
let sessionStart = null;
let sessionTimer = null;
let maxSway = 0;
let permGranted = false;
let history = JSON.parse(localStorage.getItem('gaitHistory') || '[]');
let exTimer = null;
let currentEx = null;
let voiceOn = true;

// ── Exercises ──
const EXERCISES = [
  {
    id:'e1', name:'單腳站立（患腳）', icon:'ti-shoe-off',
    desc:'扶椅背，右腳單腳站立，保持平衡',
    dur:20, rest:5,
    cues:['開始，右腳站穩', '保持骨盆水平', '感受腳底穩定感'],
    tip:'垂足術後重要：腳跟先著地，感受腳底與地面的接觸'
  },
  {
    id:'e2', name:'腳跟—腳尖走路', icon:'ti-walk',
    desc:'沿直線走，腳跟踩在前腳尖後方',
    dur:30, rest:5,
    cues:['開始，腳跟踩在腳尖後方', '眼睛看前方', '放慢步速，感受每一步'],
    tip:'改善步態滾動感，對垂足代償非常有效'
  },
  {
    id:'e3', name:'側向移重（左右）', icon:'ti-arrows-horizontal',
    desc:'站立，緩慢將重心移到右腳再回左腳',
    dur:40, rest:5,
    cues:['開始，緩慢移重到右腳', '感受右腳承重', '回到左腳，再來回'],
    tip:'改善左右負重不均，對腰椎術後代償很重要'
  },
  {
    id:'e4', name:'前後移重', icon:'ti-arrows-vertical',
    desc:'站立，重心從腳跟慢慢移到腳尖再回來',
    dur:30, rest:5,
    cues:['開始，重心在腳跟', '慢慢移到腳尖', '再移回腳跟，感受足弓'],
    tip:'重建步態滾動感，對腳底知覺訓練很有幫助'
  },
  {
    id:'e5', name:'閉眼站立', icon:'ti-eye-off',
    desc:'雙腳站立，閉眼10秒，挑戰本體覺',
    dur:15, rest:5,
    cues:['閉上眼睛', '感受腳底與地面的接觸', '核心微收，保持穩定'],
    tip:'進階訓練：去除視覺後的平衡調整，需有人在旁'
  },
];

let exDone = {};

// ── Permission ──
window.addEventListener('load', () => {
  if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
    document.getElementById('permBanner').style.display = 'flex';
  } else {
    permGranted = true;
  }
  renderExercises();
  renderHistory();
});

function requestPerm() {
  DeviceMotionEvent.requestPermission()
    .then(s => {
      if (s === 'granted') {
        permGranted = true;
        document.getElementById('permBanner').style.display = 'none';
        setStatus('normal', 'ti-check', '權限已授予，可以開始測量。');
      }
    }).catch(e => {
      setStatus('alert', 'ti-x', '無法取得權限：' + e.message);
    });
}

// ── Sensor handling ──
let smoothGamma = 0, smoothBeta = 0;

function handleMotion(e) {
  if (!isMonitoring) return;
  const gamma = e.rotationRate ? null : null;
  // Use DeviceOrientation for tilt
}

function handleOrientation(e) {
  if (!isMonitoring) return;
  const gamma = e.gamma || 0; // left/right tilt −90~90
  const beta  = e.beta  || 0; // front/back tilt

  // Smooth with EMA
  smoothGamma = smoothGamma * 0.8 + gamma * 0.2;
  smoothBeta  = smoothBeta  * 0.8 + beta  * 0.2;

  gammaData.push(smoothGamma);
  betaData.push(smoothBeta);

  // Sway = max - min over last 2s (60 samples at ~30fps → use last 60)
  const window60 = gammaData.slice(-60);
  const sway = window60.length > 1
    ? Math.max(...window60) - Math.min(...window60)
    : 0;
  if (sway > maxSway) maxSway = sway;

  updateDisplay(smoothGamma, sway);
}

function updateDisplay(gamma, sway) {
  // Gamma: negative = left tilt, positive = right tilt
  const clampedGamma = Math.max(-30, Math.min(30, gamma));
  const needlePos = 50 + (clampedGamma / 30) * 50; // 0–100%
  const fillPct   = 50 + (clampedGamma / 30) * 50;

  document.getElementById('barNeedle').style.left = needlePos + '%';
  document.getElementById('barFill').style.width  = fillPct + '%';
  document.getElementById('valLeft').textContent   = Math.max(0, -gamma).toFixed(1);
  document.getElementById('valCenter').textContent = gamma.toFixed(1);
  document.getElementById('valSway').textContent   = sway.toFixed(1);

  // Score: 100 − (|gamma|*2 + sway*3), clamped 0–100
  const rawScore = Math.max(0, Math.min(100, 100 - Math.abs(gamma) * 2 - sway * 3));
  const score = Math.round(rawScore);
  const C = C_RING;
  document.getElementById('ringFill').style.strokeDashoffset = C * (1 - score / 100);
  document.getElementById('ringScore').textContent = score;

  let grade, gradeColor, ringColor;
  if (score >= 85)      { grade='優秀'; gradeColor='#16a34a'; ringColor='var(--green)'; }
  else if (score >= 70) { grade='良好'; gradeColor='#1d4ed8'; ringColor='var(--purple)'; }
  else if (score >= 55) { grade='普通'; gradeColor='#a16207'; ringColor='var(--amber)'; }
  else                  { grade='需加強'; gradeColor='#991b1b'; ringColor='var(--red)'; }

  document.getElementById('ringGrade').textContent = grade;
  document.getElementById('ringGrade').style.color = gradeColor;
  document.getElementById('ringFill').style.stroke  = ringColor;

  // Status
  if (Math.abs(gamma) < 3 && sway < 4) {
    setStatus('good', 'ti-circle-check', '平衡良好！繼續保持正常步態。');
  } else if (Math.abs(gamma) > 12 || sway > 12) {
    setStatus('alert', 'ti-alert-triangle', `偏斜明顯（${gamma.toFixed(1)}°），留意步態代償。`);
  } else {
    setStatus('warning', 'ti-alert-circle', `輕微偏移（${gamma.toFixed(1)}°），專注中立步態。`);
  }
}

// ── Measurement control ──
function startMeasure() {
  if (!permGranted) {
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission()
        .then(s => { if (s === 'granted') { permGranted = true; startMeasure(); } })
        .catch(() => setStatus('alert', 'ti-x', '需要先授予感測器權限'));
      return;
    }
    permGranted = true; // Android / desktop — no permission needed
  }

  isMonitoring = true;
  gammaData = []; betaData = [];
  maxSway = 0;
  sessionStart = Date.now();
  smoothGamma = 0; smoothBeta = 0;

  window.addEventListener('deviceorientation', handleOrientation);

  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStop').disabled = false;
  setStatus('normal', 'ti-activity', '測量中… 直立手持手機，正常步行或站立。');

  // Session timer
  let elapsed = 0;
  sessionTimer = setInterval(() => {
    elapsed++;
    const m = Math.floor(elapsed / 60), s = elapsed % 60;
    const timeStr = m > 0 ? `${m}分${s.toString().padStart(2,'0')}秒` : `${s}秒`;
    const latest = gammaData[gammaData.length-1] || 0;
    const sway60 = gammaData.slice(-60);
    const sway = sway60.length > 1 ? Math.max(...sway60) - Math.min(...sway60) : 0;
    const score = Math.max(0, Math.min(100, Math.round(100 - Math.abs(latest)*2 - sway*3)));
    document.getElementById('statusText').textContent =
      `測量中 ${timeStr}・目前分數 ${score}・最大晃動 ${maxSway.toFixed(1)}°`;
  }, 1000);
}

function stopMeasure() {
  if (!isMonitoring) return;
  isMonitoring = false;
  window.removeEventListener('deviceorientation', handleOrientation);
  clearInterval(sessionTimer);

  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStop').disabled = true;

  if (gammaData.length === 0) {
    setStatus('normal', 'ti-info-circle', '未偵測到感測器資料。請確認手機支援陀螺儀。');
    return;
  }

  // Final score
  const avgGamma = gammaData.reduce((a,b) => a+b, 0) / gammaData.length;
  const score = Math.max(0, Math.min(100, Math.round(100 - Math.abs(avgGamma)*2 - maxSway*3)));
  const dur = Math.round((Date.now() - sessionStart) / 1000);
  const grade = score>=85?'優秀':score>=70?'良好':score>=55?'普通':'需加強';

  // Save history
  history.unshift({
    date: new Date().toLocaleDateString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}),
    score, grade, sway: maxSway.toFixed(1), dur
  });
  if (history.length > 20) history.pop();
  localStorage.setItem('gaitHistory', JSON.stringify(history));
  renderHistory();

  setStatus('good', 'ti-check', `測量完成！評分 ${score}（${grade}）・時長 ${dur}秒・最大晃動 ${maxSway.toFixed(1)}°`);
  spk(`測量完成，平衡評分${score}分，${grade}`);
}

function resetAll() {
  isMonitoring = false;
  window.removeEventListener('deviceorientation', handleOrientation);
  clearInterval(sessionTimer);
  gammaData = []; betaData = [];
  maxSway = 0; smoothGamma = 0; smoothBeta = 0;
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStop').disabled = true;
  document.getElementById('ringFill').style.strokeDashoffset = C_RING;
  document.getElementById('ringScore').textContent = '--';
  document.getElementById('ringGrade').textContent = '--';
  document.getElementById('ringGrade').style.color = 'var(--tx3)';
  document.getElementById('barNeedle').style.left = '50%';
  document.getElementById('barFill').style.width = '50%';
  document.getElementById('valLeft').textContent = '--';
  document.getElementById('valCenter').textContent = '--';
  document.getElementById('valSway').textContent = '--';
  setStatus('normal', 'ti-info-circle', '已重置。按下「開始測量」重新開始。');
}

// ── Exercise module ──
function renderExercises() {
  const grid = document.getElementById('exGrid');
  grid.innerHTML = EXERCISES.map((ex, i) => `
    <div class="ex-item ${exDone[ex.id]?'done':''}" id="exItem_${ex.id}" onclick="startExercise('${ex.id}')">
      <div class="ex-icon"><i class="ti ${exDone[ex.id]?'ti-check':ex.icon}"></i></div>
      <div class="ex-text">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-desc">${ex.desc}</div>
      </div>
      <div class="ex-dur">${exDone[ex.id]?'✓完成':ex.dur+'秒'}</div>
    </div>
  `).join('');
}

function startExercise(id) {
  currentEx = EXERCISES.find(e => e.id === id);
  if (!currentEx) return;

  const overlay = document.getElementById('timerOverlay');
  document.getElementById('timerName').textContent = currentEx.name;
  document.getElementById('timerDesc').textContent = currentEx.tip;
  document.getElementById('timerCount').textContent = currentEx.dur;
  document.getElementById('timerPhase').textContent = '準備開始';
  document.getElementById('timerCue').textContent = '';
  document.getElementById('timerRing').style.strokeDashoffset = '0';
  overlay.classList.add('show');

  spk(currentEx.name + '，' + currentEx.cues[0]);

  let rem = currentEx.dur;
  let elapsed = 0;
  const cueInterval = Math.floor(currentEx.dur / currentEx.cues.length);

  document.getElementById('timerPhase').textContent = '進行中';
  document.getElementById('timerPhase').style.color = 'var(--purple)';

  exTimer = setInterval(() => {
    rem--;
    elapsed++;
    document.getElementById('timerCount').textContent = rem;
    document.getElementById('timerRing').style.strokeDashoffset =
      C_TIMER * (rem / currentEx.dur);

    // Voice cues at intervals
    const cueIdx = Math.floor(elapsed / cueInterval);
    if (cueIdx > 0 && cueIdx < currentEx.cues.length && elapsed % cueInterval === 0) {
      spk(currentEx.cues[cueIdx]);
      document.getElementById('timerCue').textContent = currentEx.cues[cueIdx];
    }

    if (rem <= 0) {
      clearInterval(exTimer); exTimer = null;
      document.getElementById('timerPhase').textContent = '完成！';
      document.getElementById('timerPhase').style.color = 'var(--green)';
      document.getElementById('timerCue').textContent = '做得很好！';
      spk(currentEx.name + '完成，做得很好');
      exDone[currentEx.id] = true;
      setTimeout(() => {
        overlay.classList.remove('show');
        renderExercises();
      }, 1800);
    }
  }, 1000);
}

function cancelExercise() {
  if (exTimer) { clearInterval(exTimer); exTimer = null; }
  document.getElementById('timerOverlay').classList.remove('show');
  window.speechSynthesis && window.speechSynthesis.cancel();
}

// ── History ──
function renderHistory() {
  const list = document.getElementById('historyList');
  if (!history.length) {
    list.innerHTML = '<div class="empty-state">尚無測量記錄</div>';
    return;
  }
  list.innerHTML = history.slice(0, 8).map(h => `
    <div class="history-row">
      <div>
        <div style="font-size:12.5px;font-weight:600;color:var(--tx)">${h.date}</div>
        <div style="font-size:11px;color:var(--tx3)">時長 ${h.dur}秒・晃動 ${h.sway}°</div>
      </div>
      <div class="history-score-badge ${h.score>=85?'score-ex':h.score>=70?'score-gd':h.score>=55?'score-ok':'score-nd'}">
        ${h.score} · ${h.grade}
      </div>
    </div>
  `).join('');
}

// ── Utilities ──
function setStatus(type, icon, text) {
  const box = document.getElementById('statusBox');
  box.className = 'status ' + type;
  box.innerHTML = `<i class="ti ${icon}"></i><span id="statusText">${text}</span>`;
}

function spk(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-TW'; u.rate = 0.9;
  window.speechSynthesis.speak(u);
}

// Init
renderExercises();
renderHistory();
</script>
